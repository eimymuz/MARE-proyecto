<!-- ── POPUP VER SOLICITUD (componente reutilizable) ── -->
<div id="popup-ver" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
     background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;
     opacity:0;transition:opacity .2s ease">
  <div id="popup-ver-card" style="background:var(--surface);border-radius:var(--radius-lg);
       width:740px;max-width:95%;max-height:90vh;overflow-y:auto;
       box-shadow:var(--shadow-md);
       transform:scale(0.95);transition:transform .25s cubic-bezier(.34,1.56,.64,1)">

    <!-- Header -->
    <div style="padding:1.5rem 2rem;border-bottom:1px solid var(--border);
         display:flex;justify-content:space-between;align-items:flex-start;
         position:sticky;top:0;background:var(--surface);z-index:1">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span id="ver-titulo" style="font-size:22px;font-weight:500;color:var(--text)"></span>
          <span id="ver-badge" style="font-size:12px;padding:3px 12px;border-radius:20px;font-weight:500"></span>
        </div>
        <span id="ver-subtitulo" style="font-size:14px;color:var(--text-light)"></span>
      </div>
      <button onclick="cerrarPopupVer()"
        style="background:none;border:none;cursor:pointer;color:var(--text-light);
               font-size:22px;padding:4px;line-height:1;transition:color .15s;border-radius:50%;
               width:34px;height:34px;display:flex;align-items:center;justify-content:center"
        onmouseover="this.style.background='var(--bg)';this.style.color='var(--text)'"
        onmouseout="this.style.background='none';this.style.color='var(--text-light)'">✕</button>
    </div>

    <!-- Body -->
    <div style="padding:2rem">
      <div id="ver-loading" style="text-align:center;color:var(--text-light);font-size:15px;padding:3rem">
        Cargando...
      </div>
      <div id="ver-body" style="display:none">

        <!-- 3 columnas -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-bottom:1.5rem">
          <div style="padding-right:28px">
            <div style="font-size:11px;font-weight:600;color:#c9a84c;
                 text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px">Embarcación</div>
            <div id="ver-emb" style="display:flex;flex-direction:column;gap:10px"></div>
          </div>
          <div style="border-left:1px solid var(--border);padding:0 28px">
            <div style="font-size:11px;font-weight:600;color:#c9a84c;
                 text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px">Cliente</div>
            <div id="ver-cliente" style="display:flex;flex-direction:column;gap:10px"></div>
          </div>
          <div style="border-left:1px solid var(--border);padding-left:28px">
            <div style="font-size:11px;font-weight:600;color:#c9a84c;
                 text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px">Estancia</div>
            <div id="ver-estancia" style="display:flex;flex-direction:column;gap:10px"></div>
          </div>
        </div>

        <!-- Comentario -->
        <div id="ver-comentario-wrap" style="display:none;margin-bottom:1.5rem;
             border-left:3px solid #c9a84c;border-radius:0 var(--radius) var(--radius) 0;
             padding:.85rem 1.1rem">
          <div style="font-size:10px;font-weight:600;color:#8aa0b8;
               text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">
            Solicitudes especiales
          </div>
          <div id="ver-comentario" style="font-size:14px;color:var(--text)"></div>
        </div>

        <!-- Historial de ubicaciones (solo si hay asignaciones) -->
        <div id="ver-historial-wrap" style="display:none">
          <div style="font-size:11px;font-weight:600;color:#c9a84c;
               text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">
            Historial de ubicaciones
          </div>
          <div id="ver-historial"></div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div id="ver-footer" style="padding:1.1rem 2rem;border-top:1px solid var(--border);
         background:var(--bg);display:flex;gap:8px;align-items:center;flex-wrap:wrap;
         position:sticky;bottom:0">
    </div>

  </div>
</div>

<style>
.ver-field { padding:7px 9px;border-radius:6px;cursor:default;transition:background .15s; }
.ver-field:hover { background:var(--bg); }
.ver-field:hover .ver-field-val { transform:scale(1.03);color:var(--navy); }
.ver-field-label { font-size:11px;color:var(--text-light);margin-bottom:3px; }
.ver-field-val {
  font-size:15px;font-weight:500;color:var(--text);
  transition:transform .15s,color .15s;
  display:inline-block;transform-origin:left center;
}
.ver-field-val-info {
  font-size:14px;font-weight:500;color:var(--info);
  transition:transform .15s;display:inline-block;transform-origin:left center;
}
.ver-field:hover .ver-field-val-info { transform:scale(1.03); }
</style>

<script>
const CSRF_VER = "{{ csrf_token }}";

const BADGE_STYLES_VER = {
  'Pendiente':  'background:var(--warning-bg);color:var(--warning)',
  'En espera':  'background:var(--info-bg);color:var(--info)',
  'Aprobada':   'background:var(--success-bg);color:var(--success)',
  'Completada': 'background:var(--bg);color:var(--text-mid)',
  'Rechazada':  'background:var(--danger-bg);color:var(--danger)',
};

function verCampo(label, valor, esInfo=false){
  return `<div class="ver-field">
    <div class="ver-field-label">${label}</div>
    <div class="${esInfo?'ver-field-val-info':'ver-field-val'}">${valor}</div>
  </div>`;
}

async function abrirPopupVer(pk){
  const popup = document.getElementById('popup-ver');
  const card  = document.getElementById('popup-ver-card');
  popup.style.display = 'flex';
  requestAnimationFrame(()=>{
    popup.style.opacity  = '1';
    card.style.transform = 'scale(1)';
  });

  document.getElementById('ver-loading').style.display    = 'block';
  document.getElementById('ver-body').style.display       = 'none';
  document.getElementById('ver-footer').innerHTML         = '';
  document.getElementById('ver-titulo').textContent       = 'Cargando...';
  document.getElementById('ver-subtitulo').textContent    = '';
  document.getElementById('ver-badge').textContent        = '';

  try{
    const res  = await fetch(`/solicitudes/${pk}/json/`);
    const data = await res.json();

    document.getElementById('ver-titulo').textContent    = data.embarcacion;
    document.getElementById('ver-subtitulo').textContent = `${data.cliente} · Solicitud #${data.id}`;
    const badge = document.getElementById('ver-badge');
    badge.textContent   = data.estado;
    badge.style.cssText = `font-size:12px;padding:3px 12px;border-radius:20px;font-weight:500;${BADGE_STYLES_VER[data.estado]||''}`;

    document.getElementById('ver-emb').innerHTML =
      verCampo('Tipo',   data.tipo) +
      verCampo('Eslora', data.eslora+' m') +
      verCampo('Manga',  data.manga+' m') +
      verCampo('Calado', data.calado+' m');

    document.getElementById('ver-cliente').innerHTML =
      verCampo('Nombre',        data.cliente) +
      verCampo('Email',         `<a href="mailto:${data.email_cliente}" style="color:var(--info);text-decoration:none">${data.email_cliente}</a>`, true) +
      verCampo('Teléfono',      data.telefono_cliente) +
      verCampo('1ª entrada MX', data.primera_entrada_mexico
        ? '<span style="color:var(--warning);font-weight:500">Sí</span>'
        : '<span style="color:var(--text-light)">No</span>');

    document.getElementById('ver-estancia').innerHTML =
      verCampo('Solicitud', data.fecha_solicitud) +
      verCampo('Llegada',   data.fecha_llegada) +
      verCampo('Salida',    data.fecha_salida);

    // Comentario
    const comentWrap = document.getElementById('ver-comentario-wrap');
    if(data.comentario){
      document.getElementById('ver-comentario').textContent = data.comentario;
      comentWrap.style.display = 'block';
    } else {
      comentWrap.style.display = 'none';
    }

    // Historial — solo si hay asignaciones
    const histWrap = document.getElementById('ver-historial-wrap');
    if(data.asignaciones && data.asignaciones.length > 0){
      let html = '<div class="table-wrap"><table><thead><tr><th>Muelle</th><th>Espacios</th><th>Inicio</th><th>Fin</th><th>Admin</th></tr></thead><tbody>';
      data.asignaciones.forEach((a, i) => {
        const espacios = a.espacios.map(e => e.numero).join(', ') || '—';
        const actual   = i === 0
          ? `<span class="badge badge-success" style="font-size:10px;margin-left:4px">actual</span>`
          : '';
        html += `<tr>
          <td>${a.muelle}${actual}</td>
          <td>${espacios}</td>
          <td>${a.fecha_inicio}</td>
          <td>${a.fecha_fin}</td>
          <td style="font-size:12px;color:var(--text-light)">${a.administrador}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      document.getElementById('ver-historial').innerHTML = html;
      histWrap.style.display = 'block';
    } else {
      histWrap.style.display = 'none';
    }

    document.getElementById('ver-loading').style.display = 'none';
    document.getElementById('ver-body').style.display    = 'block';
    renderBotonesVer(data);

  } catch(err){
    document.getElementById('ver-loading').innerHTML =
      `<span style="color:var(--danger)">Error al cargar: ${err.message}</span>`;
  }
}

function renderBotonesVer(data){
  const pk     = data.id;
  const footer = document.getElementById('ver-footer');
  let html     = '';

  if(data.estado === 'Pendiente'){
    html += `<form method="post" action="/solicitudes/${pk}/estado/EN_ESPERA/" style="display:inline">
      <input type="hidden" name="csrfmiddlewaretoken" value="${CSRF_VER}">
      <button type="submit" class="btn btn-success">Aprobar</button>
    </form>`;
    html += `<button class="btn btn-danger"
      onclick="cerrarPopupVer();abrirModalRechazo(${pk},this.dataset.nombre,'list')"
      data-nombre="${data.embarcacion.replace(/"/g,'&quot;')}">Rechazar</button>`;
    html += `<a href="/solicitudes/${pk}/editar/" class="btn btn-default">Editar</a>`;

  } else if(data.estado === 'En espera'){
    html += `<a href="/mapa/?solicitud_id=${pk}" class="btn btn-accent">Asignar en mapa</a>`;
    html += `<button class="btn btn-default"
      onclick="window.open('https://mail.google.com/mail/?view=cm&to=${data.email_cliente}&su=Solicitud — ${data.embarcacion}&body=Estimado ${data.cliente}','_blank')">Contactar</button>`;
    html += `<a href="https://mail.google.com/mail/u/0/#search/${data.email_cliente}"
      target="_blank" class="btn btn-default">Revisar</a>`;
    html += `<button class="btn btn-danger"
      onclick="cerrarPopupVer();abrirModalRechazo(${pk},this.dataset.nombre,'en_espera')"
      data-nombre="${data.embarcacion.replace(/"/g,'&quot;')}">Rechazar</button>`;
    html += `<a href="/solicitudes/${pk}/editar/" class="btn btn-default">Editar</a>`;

  } else if(data.estado === 'Aprobada'){
    html += `<button class="btn btn-default"
      onclick="window.open('https://mail.google.com/mail/?view=cm&to=${data.email_cliente}&su=Solicitud — ${data.embarcacion}&body=Estimado ${data.cliente}','_blank')">Contactar</button>`;
    html += `<a href="https://mail.google.com/mail/u/0/#search/${data.email_cliente}"
      target="_blank" class="btn btn-default">Revisar</a>`;
    html += `<a href="/mapa/?solicitud_id=${pk}" class="btn btn-accent">Reasignar</a>`;
    html += `<a href="/solicitudes/${pk}/editar/" class="btn btn-default">Editar</a>`;
    html += `<button class="btn btn-danger"
      onclick="cerrarPopupVer();abrirModalRechazo(${pk},this.dataset.nombre,'aprobadas')"
      data-nombre="${data.embarcacion.replace(/"/g,'&quot;')}">Rechazar</button>`;
  }

  html += `<button onclick="cerrarPopupVer()" class="btn btn-default" style="margin-left:auto">Cerrar</button>`;
  footer.innerHTML = html;
}

function cerrarPopupVer(){
  const popup = document.getElementById('popup-ver');
  const card  = document.getElementById('popup-ver-card');
  popup.style.opacity  = '0';
  card.style.transform = 'scale(0.95)';
  setTimeout(()=>{ popup.style.display='none'; }, 200);
}

document.addEventListener('DOMContentLoaded', ()=>{
  const el = document.getElementById('popup-ver');
  if(el) el.addEventListener('click', function(ev){
    if(ev.target === this) cerrarPopupVer();
  });
});
</script>
