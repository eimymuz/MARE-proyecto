<header>
  <div class="header-inner">

    <a href="{% url 'inicio' %}" class="logo">
      <div class="logo-empresa">
        <img src="https://drive.google.com/thumbnail?id=1jvK1frI44vZ-WkTlk3MzQFbQ7YsC-7VI&sz=w1000" alt="Logo" style="height:40px">
      </div>
    </a>

    <nav>
      <a href="{% url 'solicitud_list' %}"
         class="nav-link {% if request.resolver_match.url_name == 'solicitud_list' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Pendientes
      </a>

      <a href="{% url 'solicitud_en_espera_list' %}"
         class="nav-link {% if request.resolver_match.url_name == 'solicitud_en_espera_list' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Esperando
      </a>

      <a href="{% url 'solicitud_aprobadas_list' %}"
         class="nav-link {% if request.resolver_match.url_name == 'solicitud_aprobadas_list' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Asignadas
      </a>


      <a href="{% url 'mapa' %}"
         class="nav-link {% if request.resolver_match.url_name == 'mapa' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
        Mapa
      </a>


      <a href="{% url 'reporte_solicitudes' %}"
         class="nav-link {% if request.resolver_match.url_name == 'reporte_solicitudes' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3v18h18"/>
          <path d="M7 14l3-3 3 2 4-5"/>
          <circle cx="7" cy="14" r="1"/>
          <circle cx="10" cy="11" r="1"/>
          <circle cx="13" cy="13" r="1"/>
          <circle cx="17" cy="8" r="1"/>
        </svg>
        Reportes
      </a>

    </nav>

    <div class="header-right">
      <div class="status-pill">
        <span class="status-dot"></span>
        Sistema activo
      </div>

      {% if user.is_authenticated %}
      <div class="user-badge">
        <div class="user-avatar">
          {{ user.get_short_name|default:user.username|first|upper }}
        </div>
        <span>{{ user.get_short_name|default:user.username }}</span>
      </div>
      {% endif %}
    </div>

  </div>
</header>
