<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
  <h2 style="margin:0">Mapa Operativo</h2>
</div>

{% if solicitud_ctx %}
<script>
window.MAPA_CTX = {
  solicitud_id:   {{ solicitud_ctx.id }},
  solicitud_label:"{{ solicitud_ctx.label }}",

{% include 'mapa/mapa_component.html' %}

{% endblock %}
